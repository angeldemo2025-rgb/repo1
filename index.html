<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;}
header{padding:15px;text-align:center;background:#1e293b;}
.container{padding:15px;}
.card{background:#1e293b;padding:15px;margin:10px 0;border-radius:10px;cursor:pointer;}
button{background:#22c55e;border:none;padding:10px;border-radius:8px;margin:5px;}
input{padding:10px;border-radius:6px;border:none;margin:5px;width:90%;}
.hidden{display:none;}
.check{width:20px;height:20px;border:2px solid #fff;display:inline-block;margin-right:10px;cursor:pointer;}
.check.active{background:lime;}
</style>
</head>

<body>

<header>Checklist PRO</header>

<div class="container" id="home">
<input id="nombre" placeholder="Nombre de la lista">
<button onclick="crear()">Crear</button>

<h3>Listas</h3>
<div id="listas"></div>
</div>

<div class="container hidden" id="detalle">
<button onclick="volver()">⬅ Volver</button>
<button onclick="compartir()">📤 Compartir</button>

<h3 id="titulo"></h3>
<div id="contenido"></div>

<input id="nuevo" placeholder="Agregar tarea">
<button onclick="agregar()">+</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVjGdI5Z3fW8bjHwfBgT5RoOfZZ4Vap8c",
  authDomain: "checklistempresa.firebaseapp.com",
  projectId: "checklistempresa",
  storageBucket: "checklistempresa.firebasestorage.app",
  messagingSenderId: "798095528680",
  appId: "1:798095528680:web:3114c0b18d5b8001826f5d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let actualId = null;
let modoVista = false;

// 🔥 CREAR LISTA
window.crear = async function(){
  try{
    let nombre = document.getElementById("nombre").value.trim();
    if(!nombre) return alert("Escribe un nombre");

    await addDoc(collection(db,"listas"),{
      nombre,
      items:[]
    });

    document.getElementById("nombre").value="";
    cargar();
  }catch(e){
    alert("Error al crear: " + e.message);
  }
};

// 🔥 CARGAR LISTAS
async function cargar(){
  try{
    listas.innerHTML="Cargando...";
    let snap = await getDocs(collection(db,"listas"));

    listas.innerHTML="";
    snap.forEach(docu=>{
      listas.innerHTML += `
      <div class="card" onclick="abrir('${docu.id}')">
        ${docu.data().nombre}
      </div>`;
    });
  }catch(e){
    listas.innerHTML="Error cargando";
  }
}

// 🔥 ABRIR
window.abrir = async function(id){
  try{
    actualId=id;

    home.classList.add("hidden");
    detalle.classList.remove("hidden");

    let snap = await getDoc(doc(db,"listas",id));
    let data = snap.data();

    titulo.innerText=data.nombre;
    render(data.items);
  }catch(e){
    alert("Error al abrir");
  }
};
function render(items){
  contenido.innerHTML="";

  items.forEach((it,i)=>{
    contenido.innerHTML+=`
    <div style="margin-bottom:10px;">
      <span class="check ${it.ok?'active':''}" onclick="toggle(${i})"></span>
      
      <span onclick="editar(${i})">${it.texto || "Sin texto"}</span>

      ${!modoVista ? `
        <button onclick="editar(${i})">✏️</button>
        <button onclick="borrar(${i})">🗑️</button>
      ` : ""}
    </div>`;
  });
}
// 🔥 RENDER
// 🗑️ BORRAR
window.borrar = async function(i){
  if(modoVista) return;

  if(!confirm("¿Borrar tarea?")) return;

  let ref = doc(db,"listas",actualId);
  let snap = await getDoc(ref);
  let data = snap.data();

  data.items.splice(i,1);

  await updateDoc(ref,{items:data.items});
  render(data.items);
};

// ✏️ EDITAR
window.editar = async function(i){
  if(modoVista) return;

  let ref = doc(db,"listas",actualId);
  let snap = await getDoc(ref);
  let data = snap.data();

  let nuevoTexto = prompt("Editar tarea:", data.items[i].texto);
  if(!nuevoTexto) return;

  data.items[i].texto = nuevoTexto;

  await updateDoc(ref,{items:data.items});
  render(data.items);
};
// 🔥 AGREGAR
window.agregar = async function(){
  try{
    if(modoVista) return alert("Solo lectura");

    let txt = nuevo.value.trim();
    if(!txt) return;

    let ref = doc(db,"listas",actualId);
    let snap = await getDoc(ref);
    let data = snap.data();

    data.items.push({texto:txt,ok:false});

    await updateDoc(ref,{items:data.items});

    nuevo.value="";
    render(data.items);
  }catch(e){
    alert("Error al agregar");
  }
};

// 🔥 TOGGLE
window.toggle = async function(i){
  try{
    if(modoVista) return;

    let ref = doc(db,"listas",actualId);
    let snap = await getDoc(ref);
    let data = snap.data();

    data.items[i].ok = !data.items[i].ok;

    await updateDoc(ref,{items:data.items});
    render(data.items);
  }catch(e){
    alert("Error");
  }
};

// 🔗 COMPARTIR
window.compartir = function(){
  let url = location.origin + location.pathname + "?id=" + actualId;

  if(navigator.share){
    navigator.share({title:"Checklist",url});
  }else{
    navigator.clipboard.writeText(url);
    alert("Link copiado");
  }
};

// 🔍 INIT
async function init(){
  let params = new URLSearchParams(location.search);
  let id = params.get("id");

  if(id){
    modoVista=true;
    abrir(id);
  }else{
    cargar();
  }
}

window.volver = function(){
  location.href = location.pathname;
};

init();

</script>

</body>
</html>
