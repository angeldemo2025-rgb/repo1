<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;}
header{padding:15px;text-align:center;background:#1e293b;}
.container{padding:15px;}
.card{background:#1e293b;padding:15px;margin:10px 0;border-radius:10px;}
button{background:#22c55e;border:none;padding:8px;border-radius:8px;margin:3px;}
input{padding:8px;border-radius:6px;border:none;margin:5px;width:90%;}
.hidden{display:none;}
.check{width:20px;height:20px;border:2px solid #fff;display:inline-block;margin-right:10px;cursor:pointer;}
.check.active{background:lime;}
</style>
</head>

<body>

<header>Checklist PRO</header>

<div class="container" id="home">
<input id="nombre" placeholder="Nombre de la lista">
<button onclick="crear()">Crear</button>

<h3>Listas</h3>
<div id="listas"></div>
</div>

<div class="container hidden" id="detalle">
<button onclick="volver()">⬅ Volver</button>
<button onclick="compartir()">📤 Compartir</button>

<h3 id="titulo"></h3>
<div id="contenido"></div>

<input id="nuevo" placeholder="Agregar tarea">
<button onclick="agregar()">+</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  doc, 
  updateDoc, 
  getDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAzYkCG7aMTJxH2NH-_xJ7utAtOV4jjcfU",
  authDomain: "checklist-bb0f7.firebaseapp.com",
  projectId: "checklist-bb0f7",
  storageBucket: "checklist-bb0f7.firebasestorage.app",
  messagingSenderId: "606230877523",
  appId: "1:606230877523:web:4b147af89d07c76f21bda6"
};
  
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let actualId = null;
let modoVista = false;

// 🔥 CREAR LISTA
window.crear = async function(){
  let nombre = document.getElementById("nombre").value.trim();
  if(!nombre) return alert("Escribe un nombre");

  await addDoc(collection(db,"listas"),{
    nombre,
    items:[]
  });

  document.getElementById("nombre").value="";
  cargar();
};

// 🔥 CARGAR LISTAS
async function cargar(){
  listas.innerHTML="Cargando...";
  let snap = await getDocs(collection(db,"listas"));

  listas.innerHTML="";
  snap.forEach(docu=>{
    let data = docu.data();

    listas.innerHTML += `
    <div class="card">
      <div onclick="abrir('${docu.id}')">
        ${data.nombre || "Sin nombre"}
      </div>

      <button onclick="editarLista('${docu.id}','${data.nombre || ""}')">✏️</button>
      <button onclick="borrarLista('${docu.id}')">🗑️</button>
    </div>`;
  });
}

// 🔥 ABRIR LISTA
window.abrir = async function(id){
  actualId=id;

  home.classList.add("hidden");
  detalle.classList.remove("hidden");

  let snap = await getDoc(doc(db,"listas",id));
  let data = snap.data();

  titulo.innerText = data.nombre || "Sin nombre";
  render(data.items);
};

// 🔥 RENDER
function render(items){
  contenido.innerHTML="";

  items.forEach((it,i)=>{
    contenido.innerHTML+=`
    <div style="margin-bottom:10px;">
      <span class="check ${it.ok?'active':''}" onclick="toggle(${i})"></span>
      
      <span onclick="editar(${i})">${it.texto || "Sin texto"}</span>

      ${!modoVista ? `
        <button onclick="editar(${i})">✏️</button>
        <button onclick="borrar(${i})">🗑️</button>
      ` : ""}
    </div>`;
  });
}

// 🔥 AGREGAR
window.agregar = async function(){
  if(modoVista) return alert("Solo lectura");

  let txt = nuevo.value.trim();
  if(!txt) return;

  let ref = doc(db,"listas",actualId);
  let snap = await getDoc(ref);
  let data = snap.data();

  data.items.push({texto:txt,ok:false});

  await updateDoc(ref,{items:data.items});

  nuevo.value="";
  render(data.items);
};

// 🔥 TOGGLE
window.toggle = async function(i){
  if(modoVista) return;

  let ref = doc(db,"listas",actualId);
  let snap = await getDoc(ref);
  let data = snap.data();

  data.items[i].ok = !data.items[i].ok;

  await updateDoc(ref,{items:data.items});
  render(data.items);
};

// 🗑️ BORRAR TAREA
window.borrar = async function(i){
  if(modoVista) return;

  let ref = doc(db,"listas",actualId);
  let snap = await getDoc(ref);
  let data = snap.data();

  data.items.splice(i,1);

  await updateDoc(ref,{items:data.items});
  render(data.items);
};

// ✏️ EDITAR TAREA
window.editar = async function(i){
  if(modoVista) return;

  let ref = doc(db,"listas",actualId);
  let snap = await getDoc(ref);
  let data = snap.data();

  let nuevoTexto = prompt("Editar:", data.items[i].texto);
  if(!nuevoTexto) return;

  data.items[i].texto = nuevoTexto;

  await updateDoc(ref,{items:data.items});
  render(data.items);
};

// 🗑️ BORRAR LISTA
window.borrarLista = async function(id){
  if(!confirm("¿Borrar lista completa?")) return;

  await deleteDoc(doc(db,"listas",id));
  cargar();
};

// ✏️ EDITAR LISTA
window.editarLista = async function(id,nombre){
  let nuevo = prompt("Nuevo nombre:", nombre);
  if(!nuevo) return;

  await updateDoc(doc(db,"listas",id),{
    nombre:nuevo
  });

  cargar();
};

// 🔗 COMPARTIR
window.compartir = function(){
  let url = location.origin + location.pathname + "?id=" + actualId;

  if(navigator.share){
    navigator.share({title:"Checklist",url});
  }else{
    navigator.clipboard.writeText(url);
    alert("Link copiado");
  }
};

// 🔍 INIT
async function init(){
  let params = new URLSearchParams(location.search);
  let id = params.get("id");

  if(id){
    modoVista=true;
    abrir(id);
  }else{
    cargar();
  }
}

// 🔙 VOLVER
window.volver = function(){
  location.href = location.pathname;
};

init();

</script>

</body>
</html>
